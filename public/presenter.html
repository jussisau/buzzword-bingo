<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buzzword Bingo — Host</title>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000;
      --surface: #0d0d0d;
      --surface2: #111;
      --border: #1c1c1c;
      --border-hover: #2c2c2c;
      --text: #fff;
      --muted: #333;
      --muted2: #555;
      --purple: #6d0bff;
      --purple-dim: #6d0bff18;
      --cyan: #5bffe2;
      --cyan-dim: #5bffe212;
      --pink: #d100a2;
      --pink-dim: #d100a215;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body { display: flex; flex-direction: column; overflow: hidden; }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .topbar-left { display: flex; align-items: center; gap: 10px; }

    .topbar-title {
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .host-badge {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted2);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .topbar-right { display: flex; align-items: center; gap: 28px; }

    .stat { display: flex; flex-direction: column; align-items: flex-end; }
    .stat .val { font-size: 1.1rem; font-weight: 700; line-height: 1; font-variant-numeric: tabular-nums; }
    .stat .lbl { font-size: 0.6rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted2); margin-top: 2px; }

    .stat.s-purple .val { color: var(--purple); }
    .stat.s-cyan .val   { color: var(--cyan); }
    .stat.s-pink .val   { color: var(--pink); }

    .divider { width: 1px; height: 28px; background: var(--border); }

    .reset-btn {
      font-size: 0.75rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--muted2);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .reset-btn:hover { color: var(--pink); border-color: var(--pink); }

    /* ── LAYOUT ── */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 300px;
      overflow: hidden;
    }

    /* ── LEADERBOARD ── */
    .lb-panel {
      padding: 24px 28px;
      overflow-y: auto;
      border-right: 1px solid var(--border);
    }

    .section-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 14px;
    }

    .lb-list { display: flex; flex-direction: column; gap: 3px; }

    .lb-row {
      display: grid;
      grid-template-columns: 26px 1fr 100px 56px;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
    }

    .lb-row:hover { background: var(--surface); }

    .lb-row.bingo {
      background: var(--pink-dim);
      border-color: #d100a225;
    }

    .lb-rank {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted2);
      text-align: center;
    }

    .lb-rank.r1 { color: var(--cyan); }
    .lb-rank.r2 { color: #888; }
    .lb-rank.r3 { color: #6a5030; }

    .lb-name {
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #ccc;
    }

    .lb-row.bingo .lb-name { color: #fff; }

    .lb-bar-wrap {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }

    .lb-bar {
      height: 100%;
      background: var(--cyan);
      border-radius: 1px;
      transition: width 0.5s ease;
    }

    .lb-row.bingo .lb-bar { background: var(--pink); }

    .lb-meta {
      font-size: 0.7rem;
      color: var(--muted2);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .bingo-tag {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--pink);
    }

    .lb-empty {
      padding: 48px 0;
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted2);
    }

    /* ── WORDS ── */
    .words-panel {
      padding: 24px 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .words-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .word-chip {
      padding: 5px 9px;
      font-size: 0.72rem;
      font-weight: 500;
      font-family: inherit;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--muted2);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .word-chip:hover {
      background: var(--surface2);
      border-color: var(--purple);
      color: var(--purple);
    }

    .word-chip.called {
      background: var(--cyan-dim);
      border-color: #5bffe228;
      color: var(--cyan);
      cursor: default;
    }

    /* ── NEW ROUND OVERLAY ── */
    .new-round-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000000cc;
      backdrop-filter: blur(8px);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-align: center;
    }

    .new-round-overlay.show { display: flex; }

    .new-round-winner {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 8px;
    }

    .new-round-name {
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--pink);
      line-height: 1;
      margin-bottom: 4px;
    }

    .new-round-label {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #fff;
      margin-bottom: 40px;
    }

    .new-round-btn {
      padding: 16px 40px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 700;
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .new-round-btn:hover { opacity: 0.85; transform: translateY(-2px); }
    .new-round-btn:active { transform: translateY(0); }

    .new-round-skip {
      margin-top: 12px;
      font-size: 0.78rem;
      color: var(--muted2);
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .new-round-skip:hover { color: #888; }

    #confetti-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 199;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-title">Buzzword Bingo</span>
      <span class="host-badge">Host</span>
    </div>
    <div class="topbar-right">
      <div class="stat s-purple">
        <div class="val" id="stat-players">0</div>
        <div class="lbl">Players</div>
      </div>
      <div class="stat">
        <div class="val" id="stat-called">0</div>
        <div class="lbl">Called</div>
      </div>
      <div class="stat s-pink">
        <div class="val" id="stat-bingos">0</div>
        <div class="lbl">Bingos</div>
      </div>
      <div class="divider"></div>
      <button class="reset-btn" onclick="resetGame()">Reset</button>
    </div>
  </div>

  <div class="main">
    <div class="lb-panel">
      <div class="section-label">Leaderboard</div>
      <div class="lb-list" id="lb-list">
        <div class="lb-empty">Waiting for players…</div>
      </div>
    </div>

    <div class="words-panel">
      <div class="section-label">Buzzwords</div>
      <div class="words-grid" id="words-grid"></div>
    </div>
  </div>

  <canvas id="confetti-canvas"></canvas>
  <div class="new-round-overlay" id="new-round-overlay">
    <div class="new-round-winner">We have a winner</div>
    <div class="new-round-name" id="new-round-name"></div>
    <div class="new-round-label">BINGO</div>
    <button class="new-round-btn" onclick="startNewRound()">Start new round</button>
    <button class="new-round-skip" onclick="dismissOverlay()">Keep playing</button>
  </div>

  <script>
    const socket = io();
    let calledWords = new Set(), allWords = [];

    fetch('/api/buzzwords').then(r => r.json()).then(words => {
      allWords = words.sort();
      renderWords();
    });

    function renderWords() {
      const grid = document.getElementById('words-grid');
      grid.innerHTML = '';
      allWords.forEach(word => {
        const chip = document.createElement('button');
        chip.className = 'word-chip' + (calledWords.has(word) ? ' called' : '');
        chip.textContent = word;
        chip.onclick = () => { if (!calledWords.has(word)) socket.emit('callWord', word); };
        grid.appendChild(chip);
      });
    }

    function resetGame() {
      socket.emit('resetGame');
    }

    socket.on('calledWords', (words) => {
      calledWords = new Set(words);
      document.getElementById('stat-called').textContent = words.length;
      renderWords();
    });

    socket.on('playerCount', (n) => {
      document.getElementById('stat-players').textContent = n;
    });

    socket.on('leaderboard', (players) => {
      document.getElementById('stat-bingos').textContent = players.filter(p => p.bingo).length;

      const list = document.getElementById('lb-list');
      if (!players.length) {
        list.innerHTML = '<div class="lb-empty">Waiting for players…</div>';
        return;
      }

      const medals = ['①','②','③'];
      list.innerHTML = players.map((p, i) => {
        const pct = Math.round((p.marked / 25) * 100);
        const rankClass = i < 3 ? `r${i+1}` : '';
        const rankLabel = i < 3 ? medals[i] : `${i+1}`;
        return `
          <div class="lb-row ${p.bingo ? 'bingo' : ''}">
            <div class="lb-rank ${rankClass}">${rankLabel}</div>
            <div class="lb-name">${esc(p.name)}</div>
            <div class="lb-bar-wrap"><div class="lb-bar" style="width:${pct}%"></div></div>
            <div class="lb-meta">${p.bingo ? '<span class="bingo-tag">BINGO</span>' : `${p.marked}/25`}</div>
          </div>
        `;
      }).join('');
    });

    // ── CONFETTI ──
    const confettiCanvas = document.getElementById('confetti-canvas');
    const ctx = confettiCanvas.getContext('2d');
    let particles = [], confettiRaf = null;
    const COLORS = ['#6d0bff','#5bffe2','#d100a2','#ffffff','#6d0bff','#5bffe2'];

    function launchConfetti() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
      particles = Array.from({ length: 180 }, () => ({
        x: Math.random() * confettiCanvas.width,
        y: -10 - Math.random() * 300,
        w: 7 + Math.random() * 9,
        h: 11 + Math.random() * 7,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        vx: (Math.random() - 0.5) * 4,
        vy: 2.5 + Math.random() * 4,
        angle: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.22,
        opacity: 1,
      }));
      if (confettiRaf) cancelAnimationFrame(confettiRaf);
      tickConfetti();
      setTimeout(() => { particles = []; }, 5000);
    }

    function tickConfetti() {
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.angle += p.spin; p.vy += 0.06;
        p.opacity = Math.max(0, 1 - Math.max(0, p.y - confettiCanvas.height * 0.7) / (confettiCanvas.height * 0.3));
        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });
      particles = particles.filter(p => p.y < confettiCanvas.height + 20);
      if (particles.length) confettiRaf = requestAnimationFrame(tickConfetti);
      else ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    }

    socket.on('bingoAlert', (name) => {
      document.getElementById('new-round-name').textContent = name;
      document.getElementById('new-round-overlay').classList.add('show');
      launchConfetti();
    });

    function startNewRound() {
      socket.emit('resetGame');
      dismissOverlay();
    }

    function dismissOverlay() {
      document.getElementById('new-round-overlay').classList.remove('show');
    }

    socket.on('gameReset', () => {
      calledWords.clear();
      renderWords();
      ['stat-called','stat-bingos'].forEach(id => document.getElementById(id).textContent = '0');
    });

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
