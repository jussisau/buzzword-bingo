<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buzzword Bingo</title>
  <script src="/socket.io/socket.io.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000;
      --surface: #0d0d0d;
      --border: #1c1c1c;
      --border-hover: #2c2c2c;
      --text: #fff;
      --muted: #333;
      --muted2: #666;
      --purple: #6d0bff;
      --purple-dim: #6d0bff20;
      --cyan: #5bffe2;
      --cyan-dim: #5bffe215;
      --pink: #d100a2;
      --pink-dim: #d100a218;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── JOIN ── */
    #join-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .brand {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 44px;
    }

    .join-title {
      font-size: clamp(2.4rem, 7vw, 3.8rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 0.95;
      text-align: center;
      margin-bottom: 16px;
      color: #fff;
    }

    .join-title em {
      font-style: normal;
      color: var(--purple);
    }

    .join-sub {
      font-size: 0.85rem;
      color: var(--muted2);
      text-align: center;
      margin-bottom: 44px;
      letter-spacing: 0.01em;
    }

    .join-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 280px;
    }

    .join-form input {
      width: 100%;
      padding: 13px 16px;
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .join-form input::placeholder { color: var(--muted2); }
    .join-form input:focus { border-color: var(--purple); }

    .join-form button {
      width: 100%;
      padding: 13px;
      font-size: 0.88rem;
      font-family: inherit;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .join-form button:hover { opacity: 0.85; transform: translateY(-1px); }
    .join-form button:active { transform: translateY(0); opacity: 1; }

    /* ── GAME ── */
    #game-screen {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 48px;
    }

    .game-header {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .game-header .logo {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted2);
    }

    .player-tag {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--purple);
      background: var(--purple-dim);
      border: 1px solid #6d0bff30;
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* BINGO header letters */
    .bingo-header {
      width: 100%;
      max-width: 480px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
      margin-bottom: 5px;
    }

    .bingo-letter {
      text-align: center;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--muted2);
      padding: 4px 0;
    }

    /* GRID */
    .bingo-grid {
      width: 100%;
      max-width: 480px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 5px;
    }

    .cell {
      aspect-ratio: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: clamp(0.52rem, 1.5vw, 0.7rem);
      font-weight: 500;
      line-height: 1.3;
      padding: 5px 3px;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      color: var(--muted2);
    }

    .cell:hover { border-color: var(--border-hover); color: #bbb; }
    .cell:active { transform: scale(0.94); }

    .cell.free {
      background: var(--purple-dim);
      border-color: #6d0bff40;
      color: var(--purple);
      font-weight: 700;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      cursor: default;
    }

    .cell.marked {
      background: var(--cyan-dim);
      border-color: #5bffe235;
      color: var(--cyan);
      font-weight: 600;
    }

    .cell.called:not(.marked) {
      border-color: #ffffff08;
      color: #444;
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.09); }
      100% { transform: scale(1); }
    }

    .cell.pop { animation: pop 0.22s ease-out; }

    /* Progress */
    .progress-row {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .progress-track {
      flex: 1;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--cyan);
      border-radius: 1px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .progress-label {
      font-size: 0.7rem;
      color: var(--muted2);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    /* Called words strip */
    .called-strip {
      width: 100%;
      max-width: 480px;
      margin-top: 14px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .called-strip-label {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-bottom: 6px;
    }

    .called-strip-words {
      font-size: 0.75rem;
      color: #444;
      line-height: 1.7;
    }

    /* BINGO win state */
    .bingo-win {
      display: none;
      width: 100%;
      max-width: 480px;
      margin-top: 14px;
      padding: 20px;
      background: var(--pink-dim);
      border: 1px solid #d100a230;
      border-radius: 12px;
      text-align: center;
    }

    .bingo-win.show { display: block; }

    .bingo-win h2 {
      font-size: 2rem;
      font-weight: 900;
      color: var(--pink);
      letter-spacing: -0.03em;
    }

    .bingo-win p {
      font-size: 0.8rem;
      color: var(--muted2);
      margin-top: 4px;
    }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #111;
      border: 1px solid var(--border-hover);
      color: #ccc;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 9px 16px;
      border-radius: 40px;
      white-space: nowrap;
      z-index: 99;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    .toast .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--pink);
      margin-right: 7px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <!-- JOIN -->
  <div id="join-screen">
    <div class="brand">Lisboa AI Workshop</div>
    <h1 class="join-title">Buzzword<br><em>Bingo</em></h1>
    <p class="join-sub">Listen carefully. Mark what you hear.</p>
    <div class="join-form">
      <input id="name-input" type="text" placeholder="Your name" maxlength="20" autocomplete="off" />
      <button onclick="joinGame()">Join the game</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="game-screen">
    <div class="game-header">
      <span class="logo">Buzzword Bingo</span>
      <span class="player-tag" id="player-tag"></span>
    </div>

    <div class="bingo-header">
      <div class="bingo-letter">B</div>
      <div class="bingo-letter">I</div>
      <div class="bingo-letter">N</div>
      <div class="bingo-letter">G</div>
      <div class="bingo-letter">O</div>
    </div>

    <div class="bingo-grid" id="bingo-grid"></div>

    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <span class="progress-label" id="progress-label">0 / 24</span>
    </div>

    <div class="bingo-win" id="bingo-win">
      <h2>BINGO</h2>
      <p>Now scream.</p>
    </div>

    <div class="called-strip">
      <div class="called-strip-label">Called</div>
      <div class="called-strip-words" id="called-words-list">None yet — ears open.</div>
    </div>
  </div>

  <canvas id="confetti-canvas"></canvas>
  <div class="toast" id="toast"><span class="dot"></span><span id="toast-text"></span></div>

  <script>
    const socket = io();
    let myCard = [], myMarked = new Set(), calledWords = new Set();

    const nameInput = document.getElementById('name-input');
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinGame(); });

    function joinGame() {
      const name = nameInput.value.trim();
      if (!name) { nameInput.focus(); return; }
      socket.emit('join', name);
      document.getElementById('player-tag').textContent = name;
      document.getElementById('join-screen').style.display = 'none';
      document.getElementById('game-screen').style.display = 'flex';
    }

    socket.on('card', ({ card, marked, calledWords: cw }) => {
      myCard = card; myMarked = new Set(marked); calledWords = new Set(cw);
      renderCard();
    });

    socket.on('marked', (marked) => { myMarked = new Set(marked); renderCard(); });
    socket.on('wordCalled', (word) => { calledWords.add(word); updateCalledWords(); showToast(`"${word}"`); });
    socket.on('calledWords', (words) => { calledWords = new Set(words); updateCalledWords(); });
    socket.on('bingoAlert', (name) => { showToast(`${name} got BINGO!`); });
    socket.on('gameReset', () => {
      document.getElementById('bingo-win').classList.remove('show');
      calledWords.clear(); updateCalledWords();
    });

    function renderCard() {
      const grid = document.getElementById('bingo-grid');
      grid.innerHTML = '';
      let nonFree = 0;

      myCard.forEach((word, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.textContent = word;

        if (word === 'FREE') {
          cell.classList.add('free', 'marked');
        } else {
          if (myMarked.has(i)) { cell.classList.add('marked'); nonFree++; }
          if (calledWords.has(word)) cell.classList.add('called');
          cell.onclick = () => toggle(i, cell);
        }

        grid.appendChild(cell);
      });

      document.getElementById('progress-fill').style.width = Math.round((nonFree / 24) * 100) + '%';
      document.getElementById('progress-label').textContent = `${nonFree} / 24`;
      const hasBingo = checkBingo(myCard, myMarked);
      const bingoEl = document.getElementById('bingo-win');
      if (hasBingo && !bingoEl.classList.contains('show')) launchConfetti();
      bingoEl.classList.toggle('show', hasBingo);
    }

    function toggle(index, cell) {
      socket.emit('mark', index);
      cell.classList.add('pop');
      cell.addEventListener('animationend', () => cell.classList.remove('pop'), { once: true });
    }

    function checkBingo(card, marked) {
      const s = 5, lines = [];
      for (let r = 0; r < s; r++) lines.push([0,1,2,3,4].map(c => r*s+c));
      for (let c = 0; c < s; c++) lines.push([0,1,2,3,4].map(r => r*s+c));
      lines.push([0,6,12,18,24], [4,8,12,16,20]);
      return lines.some(l => l.every(i => marked.has(i)));
    }

    function updateCalledWords() {
      const el = document.getElementById('called-words-list');
      el.textContent = calledWords.size ? [...calledWords].join('  ·  ') : 'None yet — ears open.';
    }

    // ── CONFETTI ──
    const confettiCanvas = document.getElementById('confetti-canvas');
    const ctx = confettiCanvas.getContext('2d');
    let particles = [], confettiRaf = null;
    const COLORS = ['#6d0bff','#5bffe2','#d100a2','#ffffff','#6d0bff','#5bffe2'];

    function launchConfetti() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
      particles = Array.from({ length: 120 }, () => ({
        x: Math.random() * confettiCanvas.width,
        y: -10 - Math.random() * 200,
        w: 6 + Math.random() * 8,
        h: 10 + Math.random() * 6,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        vx: (Math.random() - 0.5) * 3,
        vy: 2 + Math.random() * 4,
        angle: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.2,
        opacity: 1,
      }));
      if (confettiRaf) cancelAnimationFrame(confettiRaf);
      tickConfetti();
      setTimeout(stopConfetti, 4000);
    }

    function tickConfetti() {
      ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.angle += p.spin;
        p.vy += 0.05;
        p.opacity = Math.max(0, 1 - Math.max(0, p.y - confettiCanvas.height * 0.7) / (confettiCanvas.height * 0.3));
        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });
      particles = particles.filter(p => p.y < confettiCanvas.height + 20);
      if (particles.length) confettiRaf = requestAnimationFrame(tickConfetti);
      else ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    }

    function stopConfetti() {
      particles = [];
    }

    let toastTimer;
    function showToast(msg) {
      document.getElementById('toast-text').textContent = msg;
      const t = document.getElementById('toast');
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }
  </script>
</body>
</html>
